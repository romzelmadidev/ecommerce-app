{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 p-4">
            <h3>Checkout Order</h3>
            <hr>
            <p><strong>Account Number:</strong> {{ session.get('acct_number') }}</p>
            <p><strong>Total Amount:</strong> <span class="text-success fs-4 fw-bold">${{ "%.2f"|format(total) }}</span></p>
            <p class="text-muted small">
                Clicking confirm will send order details to the Bank. The Bank system will issue the payment QR code.
            </p>
            <form action="/checkout" method="POST">
                <button type="submit" class="btn btn-primary w-100 btn-lg">Confirm & Initiate Bank Payment</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
