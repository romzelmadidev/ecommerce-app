{% extends "base.html" %}
{% block content %}

<!-- Soft Banner Header -->
<div class="card border-0 mb-4 text-white shadow-sm" style="background: linear-gradient(135deg, #ff8b80, #f06292); border-radius: 12px;">
    <div class="card-body p-4 text-center">
        <h2 class="fw-bold mb-1">BEST SELLERS</h2>
        <p class="mb-0 opacity-90">Handcrafted floral arrangements made with love</p>
    </div>
</div>

<div class="row">
    {% for product in products %}
    <div class="col-6 col-md-3 mb-4">
        <div class="card product-card h-100 shadow-sm border-0">
            <!-- Flower Image Placeholder Card -->
            <div class="bg-light text-center py-4 rounded-top" style="background-color: #fff0f3 !important;">
                <span style="font-size: 3.5rem;">💐</span>
            </div>

            <div class="card-body d-flex flex-column justify-content-between p-3">
                <div>
                    <h6 class="card-title fw-bold text-dark mb-1">{{ product.name }}</h6>

                    <!-- Rating Star Bar (Flowerstore reference) -->
                    <div class="small text-warning mb-2" style="font-size: 0.8rem;">
                        ★ 4.8 <span class="text-muted">(35 reviews)</span>
                    </div>

                    <!-- Price -->
                    <div class="d-flex align-items-baseline mb-3">
                        <span class="fs-5 fw-bold" style="color: #e53935;">₱{{ "%.2f"|format(product.price) }}</span>
                        <span class="text-muted text-decoration-line-through ms-2 small">₱{{ "%.2f"|format(product.price * 1.3) }}</span>
                    </div>
                </div>

                <form action="/cart/add/{{ product.id }}" method="POST">
                    <!-- Quantity Controls -->
                    <div class="mb-2">
                        <div class="input-group input-group-sm">
                            <button class="btn btn-outline-secondary" type="button" onclick="decrementQty({{ product.id }})">-</button>
                            <input type="number" id="qty-{{ product.id }}" name="quantity" class="form-control text-center" value="1" min="1" readonly>
                            <button class="btn btn-outline-secondary" type="button" onclick="incrementQty({{ product.id }})">+</button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-pink w-100 btn-sm rounded-2">Add to Cart 🛒</button>
                </form>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    function incrementQty(id) {
        const input = document.getElementById(`qty-${id}`);
        input.value = parseInt(input.value) + 1;
    }

    function decrementQty(id) {
        const input = document.getElementById(`qty-${id}`);
        if (parseInt(input.value) > 1) {
            input.value = parseInt(input.value) - 1;
        }
    }
</script>
{% endblock %}
